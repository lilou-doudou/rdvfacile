name: rdvfacile
region: fra  # Frankfurt - Europe

services:
  - name: rdvfacile-backend
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    github:
      repo: lilou-doudou/rdvfacile
      branch: develop
      deploy_on_push: true
    instance_size_slug: apps-s-1vcpu-0.5gb  # Plan Basic ($5/mois)
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/actuator/health
    envs:
      - key: DB_URL
        scope: RUN_TIME
        type: SECRET
      - key: DB_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: TWILIO_ACCOUNT_SID
        scope: RUN_TIME
        type: SECRET
      - key: TWILIO_AUTH_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TWILIO_WHATSAPP_FROM
        scope: RUN_TIME
        value: "whatsapp:+14155238886"

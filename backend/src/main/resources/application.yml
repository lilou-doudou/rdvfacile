spring:
  main:
    lazy-initialization: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rdvfacile_bd}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:rdvfacile-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
    expiration-ms: 86400000  # 24h

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

logging:
  level:
    com.rdvfacile: DEBUG
    org.springframework.security: INFO

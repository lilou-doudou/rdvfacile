# Profil DEV — base PostgreSQL locale
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rdvfacile_bd
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.rdvfacile: DEBUG
    org.springframework.security: INFO

# Profil DEV — base H2 en mémoire (aucune installation requise)
spring:
  datasource:
    url: jdbc:h2:mem:rdvfacile;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop   # Hibernate crée le schéma depuis les entités JPA
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console        # accessible sur http://localhost:8080/api/h2-console
  flyway:
    enabled: false           # désactivé en dev, Hibernate gère le schéma

logging:
  level:
    com.rdvfacile: DEBUG
    org.springframework.security: INFO
